- type: species
  id: Avali
  name: species-name-avali
  roundStart: true
  prototype: MobAvali
  sprites: MobAvaliSprites
  defaultSkinTone: "#D2B48C"
  markingLimits: MobAvaliMarkingLimits
  dollPrototype: AppearanceAvali
  skinColoration: Hues
  maleFirstNames: names_avali_first
  femaleFirstNames: names_avali_first
  lastNames: names_avali_packs
  naming: FirstLast
  minAge: 23
  youngAge: 103
  oldAge: 257
  # Coyote: Small enough to fit in a bag
  minHeight: 0.6
  defaultHeight: 0.8
  maxHeight: 1.1
  minWidth: 0.55
  defaultWidth: 0.8
  maxWidth: 1.15
  # End Coyote
  # Coyote: Can't use customeName
  # Coyote: Add kind for markings
  kind:
    - BasicHumanlike
    - BasicFurry
  # End Coyote

- type: speciesBaseSprites
  id: MobAvaliSprites
  sprites:
    Head: MobAvaliHead
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobAvaliTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobAvaliEyes
    LArm: MobAvaliLArm
    RArm: MobAvaliRArm
    LHand: MobAvaliLHand
    RHand: MobAvaliRHand
    LLeg: MobAvaliLLeg
    RLeg: MobAvaliRLeg
    LFoot: MobAvaliLFoot
    RFoot: MobAvaliRFoot
    # Coyote Start
    Special: MobHumanoidAnyMarking
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking
    RArmExtension: MobHumanoidAnyMarking # Adds Wing Slot, this will look weird as fuck
    # End Coyote

- type: humanoidBaseSprite
  id: MobAvaliEyes
  baseSprite:
    sprite: _Starlight/Mobs/Species/Avali/parts.rsi
    state: eyes

- type: markingPoints
  id: MobAvaliMarkingLimits
  points:
    # Coyote: Allow unlimited markings
    Tail:
      required: true
      points: 999 # Coyote: Allow unlimited markings
      defaultMarkings: [ AvaliTailBase ]
    HeadSide:
      required: true
      points: 999 # Coyote: Allow unlimited markings
      defaultMarkings: [ AvaliEarsBase ]

