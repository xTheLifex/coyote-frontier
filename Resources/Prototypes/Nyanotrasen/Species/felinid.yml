    # Coyote: Allow unlimited markings
    Tail:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ FelinidTailBasic ]
    HeadTop:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ FelinidEarsBasic ]
