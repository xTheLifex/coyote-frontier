- type: entity
  id: BaseIPCOrgan
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    netsync: false
    sprite: _EE/Mobs/Species/IPC/organs.rsi
  - type: Organ
  # - type: Food
  # - type: Extractable
  #   grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Oil
          Quantity: 10

- type: entity
  id: OrganIPCEyes
  parent: BaseIPCOrgan
  name: robotic eyes
  description: "01001001 00100000 01110011 01100101 01100101 00100000 01111001 01101111 01110101 00100001"
  components:
  - type: Sprite
    layers:
      - state: eyeball-l
      - state: eyeball-r
  - type: Organ
  # hacky fix to let metabolize anything that isn't handled by the heart
  - type: Metabolizer
    maxReagents: 5
    metabolizerTypes: [ Human ]
    groups:
    - id: Food
      rateModifier: 5
      skipEffects: true
    - id: Drink
      rateModifier: 5
      skipEffects: true
    - id: Medicine
      rateModifier: 5
      skipEffects: true
    - id: Cryogenic # Frontier
      rateModifier: 5
      skipEffects: true
    - id: Narcotic
      rateModifier: 5
      skipEffects: true
    - id: Alcohol
      rateModifier: 5
      skipEffects: true
    # REVIEW: Should IPCs get affected by aphros?
    - id: Aphrodisiacs # CS: Necessary to detect aphrodisiac injected solutions.
      rateModifier: 5
      skipEffects: true
    - id: AphrodisiacDrinks # CS: Necessary to detect aphrodisiac injected solutions.
      rateModifier: 5
      skipEffects: true
    removeEmpty: true

- type: entity
  id: OrganIPCTongue
  parent: BaseIPCOrgan
  name: vocal modulator
  description: "A vocal modulator, used to produce speech."
  components:
  - type: Sprite
    state: tongue
  - type: Organ

- type: entity
  id: OrganIPCEars
  parent: BaseIPCOrgan
  name: "sonic receptors"
  description:
  components:
  - type: Sprite
    state: ears
  - type: Organ

- type: entity
  id: OrganIPCPump
  parent: BaseIPCOrgan
  name: micro pump
  description: "A micro pump, used to circulate coolant."
  components:
  - type: Sprite
    state: heart-on
  - type: Organ
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Human]
    groups:
      - id: Poison
    removeEmpty: true # stopgap for anything missed in the eyes
  # The heart 'metabolizes' medicines and poisons that aren't filtered out by other organs.
  # This is done because these chemicals need to have some effect even if they aren't being filtered out of your body.
  # You're technically 'immune to poison' without a heart, but.. uhh, you'll have bigger problems on your hands.

