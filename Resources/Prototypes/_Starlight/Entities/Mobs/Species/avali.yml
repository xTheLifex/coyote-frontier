- type: entity
  id: BaseColdBird
  abstract: true
  components:
  - type: Temperature
    heatDamageThreshold: 310
    coldDamageThreshold: 223
    currentTemperature: 261
    specificHeat: 48
  - type: ThermalRegulator
    metabolismHeat: 400 # icebirb go brrr
    radiatedHeat: 100
    implicitHeatRegulation: 1500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 261
    thermalRegulationTemperatureThreshold: 1
  - type: TemperatureSpeed
    thresholds:
      250: 0.9
      230: 0.8
      223: 0.6

- type: entity
  save: false
  name: Urist McAvali
  # CS: None of these parent exist
  id: BaseMobAvali
  parent: BaseMobHuman # CS: Inherit from BaseMobHuman
  abstract: true
  components:
  # CS: No language system
  - type: HumanoidAppearance
    species: Avali
    hideLayersOnEquip:
    - Tail
    - HeadTop
  # CS: Use Needs
  - type: Needs
    needs:
    - NeedHungerDefault
    - NeedThirstDefault
  # End CS
  - type: Icon
    sprite: _Starlight/Mobs/Species/Avali/parts.rsi
    state: full
  - type: Body
    prototype: Avali
    requiredLegs: 2
  - type: Inventory
    speciesId: avali
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: outerclothing
      shoes: # DM only for colored shoes!
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: shoes
      head:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: head
      hand:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: hand
      back:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: back
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: gloves
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 3
  - type: Speech
    speechVerb: Parrot # RMC did it right.
    speechSounds: MaleAvali
    # CS: Allow all emote
  - type: MobThresholds
    thresholds:
      0: Alive
      90: Critical
      180: Dead
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 95 #tiny
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: MaleAvali
      Female: FemaleAvali
      Unsexed: MaleAvali
  - type: MovementSpeedModifier
    baseWeightlessAcceleration: 1.6 # Avalis are specifically built to fly in low-g environments
    baseWeightlessFriction: 1
    baseWeightlessModifier: 1
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Avali
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#6C3BAA"
  - type: Bloodstream
    bloodReagent: AvaliBlood
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 6.25
  - type: Stasis
    enterStasisAction: ActionStasisEnter
    exitStasisAction: ActionStasisExit
    updateInterval: 1s
    healingPerUpdate:
      types:
    # CS: Cosmetic for balancing reason
        Heat: 0
        Cold: 0
      groups:
        Brute: 0
    bleedHealPerUpdate: 0
    critHealingModifier: 0
    stasisDamageReduction: 0
    # End CS

