# METATAGS: UpdateMarkingPoints, UpdateSpeciesBaseSprites
- type: species
  id: Feroxi
  name: species-name-feroxi
  roundStart: true
  prototype: MobFeroxi
  sprites: MobFeroxiSprites
  defaultSkinTone: "#8DB9D6"
  markingLimits: MobFeroxiMarkingLimits
  dollPrototype: MobFeroxiDummy
  skinColoration: Hues
  maleFirstNames: NamesVulpkaninMale
  femaleFirstNames: NamesVulpkaninFemale
  lastNames: NamesVulpkaninLast
  kind:
    - BasicHumanlike
    - BasicFurry

- type: speciesBaseSprites
  id: MobFeroxiSprites
  sprites:
    Head: MobFeroxiHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Chest: MobFeroxiTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    NeckFluff: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobFeroxiLArm
    RArm: MobFeroxiRArm
    LHand: MobFeroxiLHand
    RHand: MobFeroxiRHand
    LLeg: MobFeroxiLLeg
    RLeg: MobFeroxiRLeg
    LFoot: MobFeroxiLFoot
    RFoot: MobFeroxiRFoot
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking
    UndershirtUnderclothes: MobHumanoidAnyMarking
    UndershirtOverclothes: MobHumanoidAnyMarking

- type: markingPoints
  id: MobFeroxiMarkingLimits
  points:
    # Coyote: Allow unlimited markings
    HeadTop:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ FeroxiEars ]
    Snout:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ FeroxiSnout ]
    Tail:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ FeroxiTailAndDorsal ]

