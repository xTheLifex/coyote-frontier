- type: entity
  name: Urist McRaptor
  # Coyote: No BaseSpeciesPickupable
  parent: [ BaseColdBird, BaseMobSpeciesOrganic, BaseInventoryResomi]
  id: BaseMobResomi
  abstract: true
  components:
  # Coyote: No Languages, Absorbable, and Jump
  - type: DamageVisuals
    thresholds: [ 10, 30, 50, 70]
    targetLayers:
    - "enum.HumanoidVisualLayers.Chest"
    - "enum.HumanoidVisualLayers.Head"
    - "enum.HumanoidVisualLayers.LArm"
    - "enum.HumanoidVisualLayers.LLeg"
    - "enum.HumanoidVisualLayers.RArm"
    - "enum.HumanoidVisualLayers.RLeg"
    - "enum.HumanoidVisualLayers.RHand"
    - "enum.HumanoidVisualLayers.LHand"
    - "enum.HumanoidVisualLayers.RFoot"
    - "enum.HumanoidVisualLayers.LFoot"
    damageOverlayGroups:
      Brute:
        sprite: _Starlight/Mobs/Effects/Resomi/brute_damage.rsi
        color: "#C048C2"
      Burn:
        sprite: _Starlight/Mobs/Effects/Resomi/burn_damage.rsi
  - type: Bloodstream
    # Coyote: Wait for upstream to use bloodReferenceSolution
    bloodReagent: ResomiBlood
  - type: FireVisuals
    sprite: _Starlight/Mobs/Effects/onfire.rsi
    normalState: Resomi_minor_burning
    alternateState: Resomi_burning
  - type: HumanoidAppearance
    species: Resomi
    hideLayersOnEquip:
      - Special
      - Head
      - Hair
      - HeadTop
      - HeadSide
    undergarmentTop: UndergarmentTopTanktopResomi
    undergarmentBottom: UndergarmentBottomBoxersResomi
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 100
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  # Coyote: use Needs instead of Hunger
  - type: Needs
    needs:
      - NeedHungerAvali
      - NeedThirstDefault
  # End Coyote
  - type: Puller
    needsHands: false
  - type: Icon
    sprite: _Starlight/Mobs/Species/Resomi/parts.rsi
    state: full
  - type: Body
    prototype: Resomi
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatResomi # Coyote: FoodMeatChicken<FoodMeatResomi
      amount: 3
  - type: MobThresholds
    thresholds:
      0: Alive
      85: Critical
      170: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      51: 0.7  #Basicly 60% and 80%
      68: 0.5
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Hands
    handDisplacement:
      sizeMaps:
        32:
          sprite: _Starlight/Mobs/Species/Resomi/displacement.rsi
          state: inHand
  - type: Sprite # Drawlayers. Top to bottom in order I believe.
    netsync: false
    layers:
    - map: [ "enum.HumanoidVisualLayers.Chest" ]
    - map: [ "enum.HumanoidVisualLayers.Head" ]
    - map: [ "enum.HumanoidVisualLayers.Eyes" ]
    - map: [ "enum.HumanoidVisualLayers.LHand" ]
    - map: [ "enum.HumanoidVisualLayers.RHand" ]
    - map: [ "enum.HumanoidVisualLayers.LFoot" ]
    - map: [ "enum.HumanoidVisualLayers.RFoot" ]
    - map: ["socks"] # Coyote
    - map: ["underpants"] # Coyote
    - map: ["undershirt"] # Coyote
    - map: [ "enum.HumanoidVisualLayers.RArm" ]
    - map: [ "enum.HumanoidVisualLayers.LArm" ]
    - map: [ "enum.HumanoidVisualLayers.RLeg" ]
    - map: [ "enum.HumanoidVisualLayers.LLeg" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
    - map: [ "enum.HumanoidVisualLayers.Genital" ] # Coyote
    - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
    - shader: StencilClear
      sprite: Mobs/Species/Human/parts.rsi
      state: l_leg
    - map: [ "jumpsuit" ]
    - map: [ "enum.HumanoidVisualLayers.Handcuffs" ] # Doesn't work atm, but who knows in the future.
      color: "#ffffff"
      sprite: _Starlight/Objects/Misc/handcuffs.rsi
      state: body-overlay-resomi
      visible: false
    - map: [ "id" ]
    - map: [ "gloves" ]
    - map: [ "shoes" ]
    - map: [ "ears" ]
    - map: [ "outerClothing" ]
    - map: [ "eyes" ]
    - map: [ "belt" ]
    - map: [ "neck" ]
    - map: [ "back" ]
    - map: [ "enum.HumanoidVisualLayers.TailExtras" ]
    - map: [ "enum.HumanoidVisualLayers.Tail" ]
    - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
    - map: [ "enum.HumanoidVisualLayers.Hair" ]
    - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
    - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
    - map: [ "mask" ]
    - map: [ "head" ]
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]
    - map: [ "clownedon" ]
      sprite: "_Starlight/Effects/creampie.rsi"
      state: "creampie_resomi"
      visible: false
  - type: Vocal
    sounds:
      Male: UnisexResomi
      Female: UnisexResomi
      Unsexed: UnisexResomi
  - type: Speech
    speechVerb: Resomi
    speechSounds: UnisexResomi
    allowedEmotes: ['Chirp', 'Hisses', 'Purr', 'Growl', 'Trill', 'Scree', 'Call', 'Squawk']
  - type: TypingIndicator
    proto: resomi
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Resomi
  # Coyote: No NightVision, No FlashModifier, No NotLabelable
