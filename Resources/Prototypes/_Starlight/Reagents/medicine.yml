  contrabandSeverity: Minor
  allowedDepartments:
  - Medical
  # Starlight End
  flavor: medicine
  color: "#51c38c"
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi ]
        damage:
          types:
            Asphyxiation: -3.5
            Bloodloss: -3
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: HeartbreakerToxin
          min: 1
        reagent: HeartbreakerToxin
        amount: -3
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: HeartbreakerToxin
          min: 25
        damage:
          types:
            Asphyxiation: 5
            Cold: 3
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi ]
          inverted: true
        damage:
          types:
            Poison: 1.5 #Ammonia is toxic injected directly into bloodstream
            Asphyxiation: 1
            Bloodloss: 0.5
      - !type:ModifyBloodLevel
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Avali, Resomi ]
        amount: 3
        # Starlight-Start: Cyclorite Metabolism
      - !type:AdjustReagent # Amoxla for Cyclorites is a toxin not medicine
        conditions:
        - !type:ReagentCondition
          reagent: Amoxla
          min: 0.26
        - !type:MetabolizerTypeCondition
          type: [ Cyclorite ]
        reagent: Amoxla
        amount: 0.25
        # Starlight-End
