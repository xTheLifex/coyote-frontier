- type: entity
  id: CameraBug
  parent: [ BaseItem, BaseC4ContrabandUnredeemable ] # Frontier: BaseSyndicateContraband<BaseC3ContrabandNoValue
  name: camera bug
  description: An illegal syndicate device that allows you to hack into the station's camera network.
  components:
  - type: Sprite
    sprite: Objects/Devices/camera_bug.rsi
    layers:
    - state: camera_bug
  - type: Item
    sprite: Objects/Devices/camera_bug.rsi
  - type: ActivatableUI
    requireActiveHand: false
    inHandsOnly: true
    key: enum.SurveillanceCameraMonitorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SurveillanceCameraMonitorUiKey.Key:
        type: SurveillanceCameraMonitorBoundUserInterface
  - type: DeviceNetwork
    deviceNetId: Wired
    receiveFrequencyId: SurveillanceCamera
    transmitFrequencyId: SurveillanceCamera
  - type: WiredNetworkConnection
  - type: SurveillanceCameraMonitor
  - type: CameraBugBroadcast

- type: entity
  id: CameraBugCamera
  name: covert device
  description: You shouldn't be seeing this.
  categories: [ HideSpawnMenu ]
  components:
  - type: Eye
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: SurveillanceCameraEntertainment
    transmitFrequencyId: SurveillanceCamera
  - type: SurveillanceCamera
    id: covert device
    networkSet: true
    nameSet: true
  - type: SurveillanceCameraMicrophone
    blacklist:
      components:
        - SurveillanceCamera
        - SurveillanceCameraMonitor
        - RadioSpeaker
  - type: ActiveListener
    range: 6
