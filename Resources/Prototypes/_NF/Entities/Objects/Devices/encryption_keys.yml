- type: entity
  parent: [EncryptionKey, RecyclableItemDeviceTiny]
  id: EncryptionKeyTraffic
  name: shortband encryption key
  description: An encryption key for the shortband channel. Limited to a 750 meters range. # CS: increase range 500 => 750
  components:
  - type: EncryptionKey
    channels:
    - Traffic
    defaultChannel: Traffic
  - type: Item
    sprite: _NF/Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: _NF/Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_gray
    - state: stc_label

