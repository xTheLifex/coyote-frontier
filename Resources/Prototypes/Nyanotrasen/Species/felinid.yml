# METATAGS: UpdateMarkingPoints, UpdateSpeciesBaseSprites
- type: species
  id: Felinid
  name: species-name-felinid
  roundStart: true
  prototype: MobFelinid
  sprites: MobHumanSprites
  markingLimits: MobFelinidMarkingLimits
  dollPrototype: MobFelinidDummy
  minHeight: 0.65
  defaultHeight: 0.8
  maxHeight: 1.1
  minWidth: 0.6
  defaultWidth: 0.8
  maxWidth: 1.15
  skinColoration: Hues
  kind:
  - BasicFurry

- type: markingPoints
  id: MobFelinidMarkingLimits
