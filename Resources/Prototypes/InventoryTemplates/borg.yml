- type: inventoryTemplate
  id: borg
  slots:
  - name: head
    slotTexture: head
    slotFlags: HEAD
    uiWindowPos: 1,0
    strippingWindowPos: 0,0
    displayName: Head
    offset: 0.015625, -0.09375
# Coyote: We want our borgs to be able to buy ships and such
  - name: id
    slotTexture: id
    slotFlags: IDCARD
    slotGroup: SecondHotbar
    stripTime: 6
    uiWindowPos: 2,1
    strippingWindowPos: 2,4
    displayName: ID
# End Coyote

