# METATAGS: UpdateMarkingPoints, UpdateSpeciesBaseSprites
#  defaultSkinTone: "#486a1b"
- type: species
  id: Goblin
  name: species-name-goblin
  roundStart: true
  prototype: MobGoblin
  sprites: MobGoblinSprites
  markingLimits: MobGoblinMarkingLimits
  dollPrototype: MobGoblinDummy
  # CS: Small enough to fit in a bag
  minHeight: 0.6
  defaultHeight: 0.8
  minWidth: 0.55
  defaultWidth: 0.8
  # End CS
  skinColoration: Hues #Possible values: TintedHues, Hues, HumanToned
  maleFirstNames: NamesGoblinFirstMale
  femaleFirstNames: NamesGoblinFirstFemale
  lastNames: NamesGoblinLast
  kind:
  - BasicHumanlike
  - BasicFurry

