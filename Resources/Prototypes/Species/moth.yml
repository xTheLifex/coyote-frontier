# METATAGS: UpdateMarkingPoints, UpdateSpeciesBaseSprites
- type: species
  id: Moth
  name: species-name-moth
  roundStart: true
  prototype: MobMoth
  sprites: MobMothSprites
  defaultSkinTone: "#ffda93"
  markingLimits: MobMothMarkingLimits
  dollPrototype: MobMothDummy
  skinColoration: Hues
  maleFirstNames: NamesMothFirstMale
  femaleFirstNames: NamesMothFirstFemale
  lastNames: NamesMothLast
  kind:
  - BasicFurry

- type: speciesBaseSprites
  id: MobMothSprites
  sprites:
    Head: MobMothHead
    Hair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    NeckFluff: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking
    Chest: MobMothTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobMothEyes
    LArm: MobMothLArm
    RArm: MobMothRArm
    LHand: MobMothLHand
    RHand: MobMothRHand
    LLegBehind: MobHumanoidAnyMarking
    RLegBehind: MobHumanoidAnyMarking
    LFootBehind: MobHumanoidAnyMarking
    RFootBehind: MobHumanoidAnyMarking
    LLeg: MobMothLLeg
    RLeg: MobMothRLeg
    LFoot: MobMothLFoot
    RFoot: MobMothRFoot
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking
    UndershirtUnderclothes: MobHumanoidAnyMarking
    UndershirtOverclothes: MobHumanoidAnyMarking

- type: humanoidBaseSprite
  id: MobMothEyes
  baseSprite:
    sprite: Mobs/Species/Moth/parts.rsi
    state: eyes

- type: markingPoints
  id: MobMothMarkingLimits
  points:
    # Coyote: Allow unlimited markings
    Tail:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ MothWingsDefault ]
    HeadTop:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ MothAntennasDefault ]

