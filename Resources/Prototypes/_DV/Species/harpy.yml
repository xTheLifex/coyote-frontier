# METATAGS: UpdateMarkingPoints, UpdateSpeciesBaseSprites
- type: species
  id: Harpy
  name: species-name-harpy
  roundStart: true
  prototype: MobHarpy
  sprites: MobHarpySprites
  markingLimits: MobHarpyMarkingLimits
  dollPrototype: MobHarpyDummy
  minHeight: 0.6
  defaultHeight: 0.8
  minWidth: 0.55
  defaultWidth: 0.8
  skinColoration: Hues # IDK about this one quite yet.
  kind:
  - BasicHumanlike
  - BasicFurry

- type: speciesBaseSprites
  id: MobHarpySprites
  sprites:
    Head: MobHarpyHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    NeckFluff: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking
    Chest: MobHarpyTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobHarpyLArm
    RArm: MobHarpyRArm
    LHand: MobHarpyLHand
    RHand: MobHarpyRHand
    LLeg: MobHarpyLLeg
    RLeg: MobHarpyRLeg
    LLegBehind: MobHumanoidAnyMarking
    RLegBehind: MobHumanoidAnyMarking
    LFootBehind: MobHumanoidAnyMarking
    RFootBehind: MobHumanoidAnyMarking
    LFoot: MobHarpyLFoot
    RFoot: MobHarpyRFoot
    RArmExtension: MobHumanoidAnyMarking # Frontier
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking
    UndershirtUnderclothes: MobHumanoidAnyMarking
    UndershirtOverclothes: MobHumanoidAnyMarking


- type: markingPoints
  id: MobHarpyMarkingLimits
  points:
    # Coyote: Allow unlimited markings
    Tail:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ HarpyTailPhoenix ]
    HeadTop:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ HarpyEarsDefault ]
    Chest:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ HarpyChestDefault ]
    Arms:
      points: 999 # Coyote: Allow unlimited markings
      required: false
      defaultMarkings: [ HarpyWingDefaultHuescale ]

