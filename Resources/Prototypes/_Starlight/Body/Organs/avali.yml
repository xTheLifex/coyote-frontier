- type: entity
  id: OrganAvaliStomach
  parent: OrganAnimalStomach
  suffix: Avali
  name: stomach
  description: "The stomach of an avali, on closer inspection, actually consists of two stomachs."
  components:
  - type: Stomach
    specialDigestible:
      tags:
      - Meat
      - Pill
      - Crayon
      - Paper
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Avali/organs.rsi
    state: stomach

- type: entity
  id: OrganAvaliHeart
  parent: OrganHumanHeart
  suffix: Avali
  description: "The heart of an avali."
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Avali]
    groups:
    - id: Medicine
    - id: Cryogenic # Frontier
    - id: Poison
    - id: Narcotic
    - id: Aphrodisiac # Coyote edit; Necessary to detect aphrodisiac injected solutions.
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Avali/organs.rsi
    state: heart-on

- type: entity
  id: OrganAvaliLiver
  parent: OrganHumanLiver
  suffix: Avali
  description: "The liver of an avali."
  components:
  - type: Metabolizer # The liver metabolizes certain chemicals only, like alcohol.
    maxReagents: 1
    metabolizerTypes: [Avali]
    groups:
    - id: Alcohol
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Avali/organs.rsi
    state: liver

- type: entity
  id: OrganAvaliKidneys
  parent: OrganHumanKidneys
  suffix: Avali
  description: "The kidneys of an avali."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Avali/organs.rsi
    layers:
    - state: kidney-l
    - state: kidney-r

- type: entity
  id: OrganAvaliLungs
  parent: OrganHumanLungs
  suffix: Avali
  description: "The lungs of an avali."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Avali/organs.rsi
    layers:
    - state: lung-l
    - state: lung-r

- type: entity
  id: OrganAvaliEyes
  parent: OrganHumanEyes
  name: eyes
  suffix: Avali
  description: "The eyes of an Avali."
  # CS - No OrganVisualization

- type: entity
  id: OrganAvaliBrain
  parent: OrganHumanBrain
  suffix: Avali
  description: "The brain of an Avali. Where Avali think of evil thoughts"
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Avali/organs.rsi
    state: brain
