- type: species
  id: Resomi
  name: species-name-resomi
  roundStart: true
  prototype: MobResomi
  sprites: MobResomiSprites
  defaultSkinTone: "#faf7f7"
  markingLimits: MobResomiMarkingLimits
  # CS - Use Starlight's naming scheme
  maleFirstNames: resomi_first
  femaleFirstNames: resomi_first
  lastNames: names_resomi_packs
  # End CS
  dollPrototype: MobResomiDummy
  # CS - Use FirstLast scheme
  naming: FirstLast
  # Coyote: Small enough to fit in a bag, maybe too small even
  minHeight: 0.7
  defaultHeight: 1
  minWidth: 0.65
  defaultWidth: 1
  # End Coyote
  skinColoration: Hues
  sexes:
  - Unsexed # NO WAY, MY RIZZOMI SEXES ALL THE TIME!!
  - Male
  - Female
  kind:
  - RaptorLike
  allowDigilegDisplacement: false

- type: speciesBaseSprites
  id: MobResomiSprites
  sprites:
    Head: MobResomiHead
    Hair: MobResomiHair
    Chest: MobResomiTorso
    Eyes: MobResomiEyes
    LArm: MobResomiLArm
    RArm: MobResomiRArm
    LHand: MobResomiLHand
    RHand: MobResomiRHand
    LLegBehind: MobHumanoidAnyMarking
    RLegBehind: MobHumanoidAnyMarking
    LFootBehind: MobHumanoidAnyMarking
    RFootBehind: MobHumanoidAnyMarking
    LLeg: MobResomiLLeg
    RLeg: MobResomiRLeg
    LFoot: MobResomiLFoot
    RFoot: MobResomiRFoot
    Tail: MobHumanoidAnyMarking
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking
    NeckFluff: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking
    UndershirtUnderclothes: MobHumanoidAnyMarking
    UndershirtOverclothes: MobHumanoidAnyMarking

- type: markingPoints
  id: MobResomiMarkingLimits
  onlyWhitelisted: true
  points:
    Hair:
      points: 1
      required: false
    Tail:
      points: 2
      required: true
      defaultMarkings: [ ResomiTail, ResomiTailFeathers ]
    Legs:
      points: 2
      required: false
    Arms:
      points: 2
      required: false
    Head:
      points: 2
      required: false
    Chest:
      points: 1
      required: false

