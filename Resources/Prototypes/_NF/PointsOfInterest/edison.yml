- type: pointOfInterest
  id: Edison
  parent: BasePOI
  name: 'Edison Power Plant'
  minimumDistance: 2000
  maximumDistance: 2250
  minimumClearance: 1000
  spawnGroup: Required
  gridPath: /Maps/_CS/POI/edison.yml # CS: Changed to new Edison Map
  addComponents:
  - type: IFF
    color: "#3737F8"
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true
  - type: StationTransit
    routes:
      SpawnPoints: 40

- type: gameMap
  id: Edison
  mapName: 'Edison Power Plant'
  mapPath: /Maps/_CS/POI/edison.yml # CS: Changed to new Edison map
  minPlayers: 0
  stations:
    Edison:
      stationProto: StandardFrontierDepot
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Edison Power Plant'
        - type: ExtraStationInformation
          iconPath: /Textures/_NF/Interface/StationIcons/banner_engineering.png
          stationSubtext: frontier-lobby-edison-subtext
          stationDescription: frontier-lobby-edison-description
          lobbySortOrder: 5
        - type: StationJobs
          availableJobs:
            PlantManager: [ 1, 1 ]
            PlantTechnician: [ -1, -1 ]

