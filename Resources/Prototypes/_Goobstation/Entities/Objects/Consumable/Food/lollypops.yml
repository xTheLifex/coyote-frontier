      orGroup: LollypopMystery
      prob: 0.30 # Rarer since it's a good medication.
    - id: FoodSnackLollypopOmnizine
      orGroup: LollypopMystery
      prob: 0.15 # Reduced slightly since I'm making the dispenser more common


