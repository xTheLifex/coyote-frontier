# METATAGS: UpdateMarkingPoints, UpdateSpeciesBaseSprites
- type: species
  id: Rodentia
  name: species-name-rodentia
  roundStart: true # Frontier - off
  prototype: MobRodentia
  sprites: MobRodentiaSprites
  defaultSkinTone: "#747474"
  markingLimits: MobRodentiaMarkingLimits
  dollPrototype: MobRodentiaDummy
  # Coyote: Small enough to fit in a bag
  minHeight: 0.6
  defaultHeight: 0.8
  minWidth: 0.55
  defaultWidth: 0.8
  # End Coyote
  skinColoration: Hues
  maleFirstNames: NamesRodentiaMale
  femaleFirstNames: NamesRodentiaFemale
  lastNames: NamesRodentiaLast
  naming: LastFirst
  kind:
  - BasicHumanlike
  - BasicFurry

- type: speciesBaseSprites
  id: MobRodentiaSprites
  sprites:
    Head: MobRodentiaHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Chest: MobRodentiaTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    NeckFluff: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobRodentiaLArm
    RArm: MobRodentiaRArm
    LHand: MobRodentiaLHand
    RHand: MobRodentiaRHand
    LLeg: MobRodentiaLLeg
    RLeg: MobRodentiaRLeg
    LLegBehind: MobHumanoidAnyMarking
    RLegBehind: MobHumanoidAnyMarking
    LFootBehind: MobHumanoidAnyMarking
    RFootBehind: MobHumanoidAnyMarking
    LFoot: MobRodentiaLFoot
    RFoot: MobRodentiaRFoot
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking
    Special: MobHumanoidAnyMarking
    UndershirtUnderclothes: MobHumanoidAnyMarking
    UndershirtOverclothes: MobHumanoidAnyMarking

- type: markingPoints
  id: MobRodentiaMarkingLimits
  points:
    # Coyote: Allow unlimited markings
    Tail:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ RodentiaTailDefault ]
    HeadTop:
      points: 999 # Coyote: Allow unlimited markings
      required: true
      defaultMarkings: [ RodentiaHeadTopEarDefault ]

