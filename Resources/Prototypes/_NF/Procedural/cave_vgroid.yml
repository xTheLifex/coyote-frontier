# Okay so my general thought is this:
# 1. Generate the large mass
# 2. Generate smaller masses offset
# 3. Generate N normal dungeons around the larger mass, preferably near the border
# 4. Generate large paths / small paths around the place
# 5. Spawn ores + fill the rest and the normal stuff

# If you want mobs they needed to be added at specific steps due to how dungeons work at the moment.

- type: dungeonConfig
  id: NFVGRoidCave
  layers:
    - !type:PrototypeDunGen
      proto: NFVGRoidBlobCave
    - !type:PrototypeDunGen
      proto: NFVGRoidExteriorCave
#    - !type:PrototypeDunGen
#      proto: NFVGRoidSmallerCave
    - !type:PrototypeDunGen
      proto: NFVGRoidSmallPathsCave
    - !type:EntityTableDunGen
      minCount: 7
      maxCount: 12
      table:
        id: NFVGRoidInteriorRoomMarker
    - !type:BiomeDunGen
      biomeTemplate: NFVGRoidCaves
      tileMask:
      - FloorCaveDrought
    # Fill
    # - !type:PrototypeDunGen
      # proto: NFVGRoidFillCave
    # "WarpPoint"
    - !type:OreDunGen
      tileMask:
      - FloorCaveDrought
      entity: WarpPointDungeon
      count: 1
      minGroupSize: 1
      maxGroupSize: 1
    # "Ores"
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: NFRockElementalSpawner
      count: 50 # Coyote: rock spawns halved-ish
      minGroupSize: 1
      maxGroupSize: 1
    # Ores
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockTin
      count: 25 # Coyote: rock spawns halved-ish
      minGroupSize: 10
      maxGroupSize: 15
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockCoal
      count: 25 # Coyote: rock spawns halved-ish
      minGroupSize: 8
      maxGroupSize: 12
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockQuartz
      count: 25 # Coyote: rock spawns halved-ish
      minGroupSize: 10
      maxGroupSize: 15
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockSalt
      count: 25 # Coyote: rock spawns halved-ish
      minGroupSize: 8
      maxGroupSize: 12
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockGold
      count: 20 # Coyote: rock spawns halved-ish
      minGroupSize: 8
      maxGroupSize: 12
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockSilver
      count: 20 # Coyote: rock spawns halved-ish
      minGroupSize: 8
      maxGroupSize: 12
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockPlasma
      count: 20 # Coyote: rock spawns halved-ish
      minGroupSize: 4
      maxGroupSize: 8
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockUranium
      count: 18 # Coyote: rock spawns halved-ish
      minGroupSize: 4
      maxGroupSize: 8
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: NFWallCobblebrick
      count: 50 # Coyote: rock spawns halved-ish
      minGroupSize: 6
      maxGroupSize: 16
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockArtifactFragment
      count: 13 # Coyote: rock spawns halved-ish
      minGroupSize: 1
      maxGroupSize: 3
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: WallRockDiamond
      count: 8 # Coyote: rock spawns halved-ish
      minGroupSize: 1
      maxGroupSize: 2
    - !type:OreDunGen
      entityMask:
      - WallRock
      entity: NFWallRockBluespace
      count: 5 # Coyote: rock spawns halved-ish
      minGroupSize: 1
      maxGroupSize: 1
    # Decoration
    # - !type:OreDunGen
      # tileMask:
      # - FloorCaveDrought
      # entity: FloraRockSolid
      # count: 20
      # minGroupSize: 1
      # maxGroupSize: 1
    # Mobs
    - !type:OreDunGen
      tileMask:
      - FloorCaveDrought
      entity: SpawnMobExplorerEVAT3
      count: 2 # Coyote: mobs in the rocks halved-ish
      minGroupSize: 1
      maxGroupSize: 1

# Configs
- type: dungeonConfig
  id: NFVGRoidBlobCave
  layers:
  - !type:NoiseDistanceDunGen
    size: 200, 200 # Coyote change: reduces max size due to increased spawn cap
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.80
    layers:
    - tile: FloorCaveDrought
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5

- type: dungeonConfig
  id: NFVGRoidSmallerCave
  minOffset: 40
  maxOffset: 60
  layers:
  - !type:NoiseDistanceDunGen
    size: 100, 100 # Coyote change: reduces max size due to increased spawn cap
    distanceConfig: !type:DunGenEuclideanSquaredDistance
    layers:
    - tile: FloorCaveDrought
      threshold: 0.50
      noise:
        frequency: 0.080
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 1.5
        gain: 0.5

- type: dungeonConfig
  id: NFVGRoidExteriorCave
  reserveTiles: true
  layers:
  - !type:PrototypeDunGen
    proto: NFVGRoidExteriorDungeonsCave
  - !type:SplineDungeonConnectorDunGen
    tile: PlatingAsteroid
    widenTile: FloorCaveDrought

- type: dungeonConfig
  id: NFVGRoidExteriorDungeonsCave
  reserveTiles: true
  minCount: 1 # Coyote change: dungeons to 1-2 instead of 2-3
  maxCount: 2 # Coyote change: dungeons to 1-2 instead of 2-3
  layers:
  - !type:ExteriorDunGen
    proto: NFSalvageOutpost
  # - !type:EntityTableDunGen # Coyote remove start: Remove MOST of the floor clutter to try and save on lag
    # minCount: 25
    # maxCount: 40
    # table: !type:NestedSelector
      # tableId: SalvageScrapSpawnerCommon
    # perDungeon: true
  # - !type:EntityTableDunGen
    # minCount: 30
    # maxCount: 40
    # table: !type:NestedSelector
      # tableId: SalvageScrapSpawnerValuable
    # perDungeon: true
  # - !type:EntityTableDunGen
    # minCount: 15
    # maxCount: 25
    # table: !type:NestedSelector
      # tableId: SalvageTreasureSpawnerCommon
    # perDungeon: true
  # - !type:EntityTableDunGen
    # minCount: 15
    # maxCount: 25
    # table: !type:NestedSelector
      # tableId: SalvageEquipmentSpawnerCommon
    # perDungeon: true # Coyote remove end: Remove MOST of the floor clutter to try and save on lag
  - !type:EntityTableDunGen
    minCount: 15
    maxCount: 20
    table: !type:NestedSelector
      tableId: SalvageTreasureSpawnerValuable
    perDungeon: true
  - !type:EntityTableDunGen
    minCount: 15
    maxCount: 20
    table: !type:NestedSelector
      tableId: SalvageEquipmentSpawnerValuable
    perDungeon: true
  - !type:MobsDunGen
    minCount: 8
    maxCount: 15
    contents: SpawnMobExplorerEVAT2Table
  - !type:MobsDunGen
    minCount: 0
    maxCount: 1
    contents: SpawnMobExplorerBossTable # Boss

- type: entityTable
  id: SpawnMobExplorerEVAT2Table
  table: !type:GroupSelector
    children:
    - id: SpawnMobExplorerEVAT2
      amount: 1

- type: entityTable
  id: SpawnMobExplorerBossTable
  table: !type:GroupSelector
    children:
    - id: SpawnMobExplorerBoss
      amount: 1

#- type: dungeonConfig
#  id: NFVGRoidInteriorDungeonsCave
#  minCount: 3
#  maxCount: 5
#  # Just randomly spawn these in bounds, doesn't really matter if they go out.

- type: dungeonConfig
  id: NFVGRoidSmallPathsCave
  reserveTiles: true
  layers:
  - !type:ReplaceTileDunGen
    layers:
    - tile: FloorCaveDrought
      threshold: 0.75
      noise:
        frequency: 0.040
        noiseType: OpenSimplex2
        fractalType: Ridged
        lacunarity: 1.5
        octaves: 2
        gain: 2.0

# Caves
- type: biomeTemplate
  id: NFVGRoidCaves
  layers:
    - !type:BiomeEntityLayer
      threshold: 0.85
      noise:
        seed: 2
        noiseType: OpenSimplex2
        fractalType: PingPong
      allowedTiles:
        - FloorCaveDrought
      entities:
        - CrystalGreen
        - CrystalPink
        - CrystalOrange
        - CrystalBlue
        - CrystalCyan
    - !type:BiomeEntityLayer
      threshold: 0.95
      noise:
        seed: 1
        noiseType: OpenSimplex2
        frequency: 1
      allowedTiles:
      - FloorCaveDrought
      entities:
      - FloraStalagmite
    - !type:BiomeEntityLayer
      threshold: -0.5
      invert: true
      noise:
        seed: 0
        noiseType: Perlin
        fractalType: Ridged
        octaves: 1
        frequency: 0.1
        gain: 0.5
      allowedTiles:
        - FloorCaveDrought
      entities:
        - WallRock
    - !type:BiomeDummyLayer
      id: Loot
    - !type:BiomeTileLayer
      threshold: -1.0
      tile: FloorCaveDrought
